services:
  - type: web
    name: api-pulse-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free

    # Render sets PORT automatically — uvicorn must bind to it
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1

    healthCheckPath: /health

    envVars:
      - key: DATABASE_URL
        sync: false          # you will paste the value in Render dashboard

      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value

      - key: ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"

      - key: DATABASE_SSL
        value: require

      - key: CORS_ORIGINS
        value: "*"           # update this to your frontend URL after deploy
